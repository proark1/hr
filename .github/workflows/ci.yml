name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @myhr/db generate
      # Build every workspace package (db/types/sdk) so apps that import
      # them resolve via their compiled dist/ during typecheck + next build.
      - run: pnpm --filter "./packages/*" build
      - run: pnpm typecheck
      - name: Verify OpenAPI snapshot is up to date
        run: pnpm --filter @myhr/api openapi:check
      - name: Lint OpenAPI spec
        run: pnpm --filter @myhr/api openapi:lint
      - name: Verify SDK covers every spec operation
        run: pnpm --filter @myhr/api openapi:sdk-coverage
      - name: Build static API docs
        run: pnpm --filter @myhr/api openapi:docs
      - name: Upload API docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: apps/api/dist-docs/
          if-no-files-found: error

name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Don't queue concurrent docs deploys — we only want the latest.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @myhr/db generate
      - run: pnpm --filter "./packages/*" build
      - run: pnpm --filter @myhr/api openapi:docs
      # Redoc emits a single HTML; rename to index.html and add the spec
      # file alongside so integrators can curl the raw JSON.
      - name: Stage docs site
        run: |
          mkdir -p _site
          cp apps/api/dist-docs/index.html _site/index.html
          cp apps/api/openapi.json _site/openapi.json
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
